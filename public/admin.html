<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFello 管理后台</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #060b07;
        --card: #101813;
        --card-soft: #132019;
        --text: #f4fff7;
        --muted: #96b39f;
        --accent: #34ef8d;
        --border: #1f3128;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at 10% 0%, #183223 0%, var(--bg) 45%);
        color: var(--text);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }
      .title {
        margin: 0;
        font-size: 28px;
      }
      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }
      .panel {
        background: linear-gradient(180deg, var(--card) 0%, #0c140f 100%);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      input, select, button {
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card-soft);
        color: var(--text);
        padding: 10px 12px;
        font-size: 14px;
      }
      input {
        min-width: 280px;
      }
      button {
        cursor: pointer;
        background: linear-gradient(180deg, #38f795 0%, #2fdd84 100%);
        color: #032111;
        border: none;
        font-weight: 700;
      }
      button.secondary {
        background: var(--card-soft);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      .metric {
        background: #0f1813;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .metric-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }
      .metric-value {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .metric-note {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }
      .status {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        font-size: 13px;
      }
      th, td {
        border-bottom: 1px solid var(--border);
        text-align: left;
        padding: 10px 8px;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      .chip {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }
      .chip-paid {
        background: rgba(52, 239, 141, 0.18);
        color: #7ff9b4;
      }
      .chip-unpaid {
        background: rgba(188, 200, 192, 0.16);
        color: #c7d7cd;
      }
      .code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      @media (max-width: 700px) {
        .title {
          font-size: 22px;
        }
        input {
          min-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <h1 class="title">VibeFello 管理后台</h1>
          <p class="subtitle">真实流量与转化数据（PV/UV、Waitlist 邮箱、付费与会员编号）。</p>
        </div>
      </header>

      <section class="panel">
        <div class="controls">
          <input id="username" type="text" placeholder="后台账号" value="vibecoder" />
          <input id="password" type="password" placeholder="后台密码" />
          <input id="token" type="password" placeholder="可选：ADMIN_TOKEN" />
          <select id="range">
            <option value="7">最近 7 天</option>
            <option value="14">最近 14 天</option>
            <option value="30" selected>最近 30 天</option>
            <option value="60">最近 60 天</option>
            <option value="90">最近 90 天</option>
          </select>
          <button id="refresh">刷新数据</button>
          <button id="save" class="secondary">保存登录信息</button>
        </div>
        <p id="status" class="status">已就绪。</p>
      </section>

      <section class="panel">
        <h2>核心指标（真实数据）</h2>
        <div id="metrics" class="metrics"></div>
      </section>

      <section class="panel">
        <h2>每日 PV / UV / Waitlist / 付费</h2>
        <table>
          <thead>
            <tr>
              <th>日期（UTC）</th>
              <th>PV</th>
              <th>UV</th>
              <th>Waitlist 邮箱数</th>
              <th>付费人数</th>
            </tr>
          </thead>
          <tbody id="dailyBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>真实 Waitlist 邮箱与会员</h2>
        <table>
          <thead>
            <tr>
              <th>邮箱</th>
              <th>会员编号</th>
              <th>付费</th>
              <th>优先权限</th>
              <th>支付状态</th>
              <th>创建时间</th>
              <th>付费时间</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </section>
    </div>

    <script>
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const tokenInput = document.getElementById("token");
      const rangeInput = document.getElementById("range");
      const refreshButton = document.getElementById("refresh");
      const saveButton = document.getElementById("save");
      const statusEl = document.getElementById("status");
      const metricsEl = document.getElementById("metrics");
      const dailyBody = document.getElementById("dailyBody");
      const leadsBody = document.getElementById("leadsBody");
      const USERNAME_STORAGE_KEY = "vibefello_admin_username";
      const PASSWORD_STORAGE_KEY = "vibefello_admin_password";
      const TOKEN_STORAGE_KEY = "vibefello_admin_token";

      function formatNumber(value) {
        return new Intl.NumberFormat("zh-CN").format(value || 0);
      }

      function formatRate(rate) {
        return `${(Number(rate || 0) * 100).toFixed(2)}%`;
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "-";
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function getHeaders() {
        const token = tokenInput.value.trim();
        if (!token) return null;
        return {
          "x-admin-token": token,
          "Content-Type": "application/json",
        };
      }

      function getCredentialHeaders() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
          return null;
        }

        return {
          "Authorization": `Basic ${btoa(`${username}:${password}`)}`,
          "Content-Type": "application/json",
        };
      }

      function resolveHeaders() {
        const tokenHeaders = getHeaders();
        if (tokenHeaders) {
          return tokenHeaders;
        }

        return getCredentialHeaders();
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#ff9f9f" : "var(--muted)";
      }

      async function loadStats() {
        const headers = resolveHeaders();
        if (!headers) {
          setStatus("请先输入后台账号密码或 ADMIN_TOKEN。", true);
          return null;
        }

        const range = Number(rangeInput.value || 30);
        const response = await fetch(`/api/admin-stats?range_days=${range}`, { headers });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || "加载统计失败。");
        }
        return response.json();
      }

      async function loadLeads() {
        const headers = resolveHeaders();
        if (!headers) return null;

        const response = await fetch("/api/admin-leads?limit=200", { headers });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || "加载邮箱数据失败。");
        }
        return response.json();
      }

      function renderMetrics(stats) {
        if (!stats) {
          metricsEl.innerHTML = "";
          return;
        }

        const cards = [
          { label: `PV（最近 ${stats.rangeDays} 天）`, value: formatNumber(stats.period.pageViews), note: `累计 ${formatNumber(stats.lifetime.pageViews)}` },
          { label: `UV（最近 ${stats.rangeDays} 天）`, value: formatNumber(stats.period.visitors), note: `累计 ${formatNumber(stats.lifetime.visitors)}` },
          { label: `Waitlist 真实邮箱（最近 ${stats.rangeDays} 天）`, value: formatNumber(stats.period.waitlistLeads), note: `累计 ${formatNumber(stats.lifetime.waitlistLeads)}` },
          { label: `发起支付（最近 ${stats.rangeDays} 天）`, value: formatNumber(stats.period.checkoutStarted), note: `累计 ${formatNumber(stats.lifetime.checkoutStarted)}` },
          { label: `付费人数（最近 ${stats.rangeDays} 天）`, value: formatNumber(stats.period.paidMembers), note: `累计 ${formatNumber(stats.lifetime.paidMembers)}` },
          { label: "UV → Waitlist 转化", value: formatRate(stats.period.waitlistConversionRate), note: "最近周期转化率" },
          { label: "Waitlist → 付费转化", value: formatRate(stats.period.leadToPaidConversionRate), note: "最近周期转化率" },
          { label: "UV → 付费转化", value: formatRate(stats.period.visitorToPaidConversionRate), note: "最近周期转化率" },
          { label: "最新会员编号", value: stats.lifetime.latestMemberId || "-", note: "编号区间 001-999" },
        ];

        metricsEl.innerHTML = cards
          .map((card) => `
            <article class="metric">
              <div class="metric-label">${card.label}</div>
              <div class="metric-value">${card.value}</div>
              <div class="metric-note">${card.note}</div>
            </article>
          `)
          .join("");
      }

      function renderDaily(stats) {
        const daily = stats?.daily || [];
        if (!daily.length) {
          dailyBody.innerHTML = `<tr><td colspan="5">暂无每日统计数据。</td></tr>`;
          return;
        }

        dailyBody.innerHTML = [...daily]
          .reverse()
          .map((row) => `
            <tr>
              <td class="code">${row.date}</td>
              <td>${formatNumber(row.pageViews)}</td>
              <td>${formatNumber(row.uniqueVisitors)}</td>
              <td>${formatNumber(row.waitlistLeads)}</td>
              <td>${formatNumber(row.paidMembers)}</td>
            </tr>
          `)
          .join("");
      }

      function renderLeads(result) {
        const leads = result?.leads || [];
        if (!leads.length) {
          leadsBody.innerHTML = `<tr><td colspan="7">暂无邮箱数据。</td></tr>`;
          return;
        }

        leadsBody.innerHTML = leads
          .map((lead) => `
            <tr>
              <td class="code">${lead.email || "-"}</td>
              <td class="code">${lead.memberId || "-"}</td>
              <td>${lead.paid ? '<span class="chip chip-paid">已付费</span>' : '<span class="chip chip-unpaid">未付费</span>'}</td>
              <td>${lead.priorityAccess ? "是" : "否"}</td>
              <td class="code">${lead.checkoutStatus || "-"}</td>
              <td>${formatDate(lead.createdAt)}</td>
              <td>${formatDate(lead.paidAt)}</td>
            </tr>
          `)
          .join("");
      }

      async function refreshDashboard() {
        try {
          setStatus("正在加载真实数据...");
          const [stats, leads] = await Promise.all([loadStats(), loadLeads()]);
          renderMetrics(stats);
          renderDaily(stats);
          renderLeads(leads);
          setStatus(`已更新：${formatDate(stats?.updatedAt || new Date().toISOString())}`);
        } catch (error) {
          console.error(error);
          setStatus(error instanceof Error ? error.message : "刷新后台失败。", true);
        }
      }

      saveButton.addEventListener("click", () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const token = tokenInput.value.trim();

        if (!token && (!username || !password)) {
          setStatus("请先输入账号密码或 token 再保存。", true);
          return;
        }

        if (username) {
          localStorage.setItem(USERNAME_STORAGE_KEY, username);
        }
        if (password) {
          localStorage.setItem(PASSWORD_STORAGE_KEY, password);
        }
        if (token) {
          localStorage.setItem(TOKEN_STORAGE_KEY, token);
        }

        setStatus("登录信息已保存到当前浏览器。");
      });

      refreshButton.addEventListener("click", () => {
        refreshDashboard();
      });

      const savedUsername = localStorage.getItem(USERNAME_STORAGE_KEY);
      const savedPassword = localStorage.getItem(PASSWORD_STORAGE_KEY);
      const savedToken = localStorage.getItem(TOKEN_STORAGE_KEY);
      if (savedUsername) {
        usernameInput.value = savedUsername;
      }
      if (savedPassword) {
        passwordInput.value = savedPassword;
      }
      if (savedToken) {
        tokenInput.value = savedToken;
      }

      refreshDashboard();
    </script>
  </body>
</html>
